<svg width="1600" height="640" viewBox="0 0 1600 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08131F"/>
      <stop offset="0.5" stop-color="#10283B"/>
      <stop offset="1" stop-color="#0E3A35"/>
    </linearGradient>
    <linearGradient id="card" x1="250" y1="150" x2="1220" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#102538" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#153C37" stop-opacity="0.94"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#39D0FF"/>
      <stop offset="1" stop-color="#9AFF8F"/>
    </linearGradient>
    <filter id="shadow" x="180" y="100" width="1240" height="440" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1600" height="640" rx="28" fill="url(#bg)"/>
  <circle cx="1310" cy="110" r="160" fill="#3FD1FF" opacity="0.08"/>
  <circle cx="250" cy="520" r="210" fill="#97FF7C" opacity="0.08"/>
  <path d="M0 500C180 430 360 410 500 450C680 502 820 596 1010 579C1235 559 1375 420 1600 400V640H0V500Z" fill="#06131D" opacity="0.45"/>

  <g filter="url(#shadow)">
    <rect x="220" y="120" width="1160" height="400" rx="30" fill="url(#card)" stroke="rgba(255,255,255,0.16)"/>
  </g>

  <rect x="280" y="182" width="170" height="40" rx="20" fill="#163E59"/>
  <text x="365" y="208" text-anchor="middle" fill="#B9EDFF" font-family="Verdana, Geneva, sans-serif" font-size="20" font-weight="700">COMMUNITY FORK</text>

  <rect x="468" y="182" width="188" height="40" rx="20" fill="#184C43"/>
  <text x="562" y="208" text-anchor="middle" fill="#C8FFCF" font-family="Verdana, Geneva, sans-serif" font-size="20" font-weight="700">AI ASSISTED</text>

  <text x="280" y="290" fill="white" font-family="Verdana, Geneva, sans-serif" font-size="70" font-weight="700">Meshtastic Pager Mode</text>
  <text x="280" y="344" fill="#92E7FF" font-family="Verdana, Geneva, sans-serif" font-size="34" font-weight="700">Small-screen fork for Heltec V3 / V4 and other readable-first devices</text>

  <text x="280" y="405" fill="#D8E6EE" font-family="Verdana, Geneva, sans-serif" font-size="28">
    <tspan x="280" dy="0">Built by interested people, without financial motivation, and shared for the community.</tspan>
    <tspan x="280" dy="40">Создан энтузиастами без коммерческой выгоды и выложен просто чтобы помочь другим.</tspan>
  </text>

  <g transform="translate(1090 185)">
