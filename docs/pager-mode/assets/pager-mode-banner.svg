<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0a1214"/>
  <path d="M800 0L1200 0V630L700 630Z" fill="#0d1b1e"/>
  
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#162c31" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" />

  <g transform="translate(80, 120)">
    <text font-family="monospace" font-weight="bold" fill="#4fd1c5" font-size="20" letter-spacing="4">COMMUNITY | HELTEC V4</text>
    <text y="80" font-family="sans-serif" font-weight="900" fill="#ffffff" font-size="72">Meshtastic Pager OS</text>
    
    <g transform="translate(0, 160)">
      <rect width="4" height="100" fill="#4fd1c5"/>
      <text x="20" y="30" font-family="sans-serif" fill="#a0aec0" font-size="24">Simple message pager built on the</text>
      <text x="20" y="65" font-family="sans-serif" fill="#a0aec0" font-size="24">Meshtastic radio stack.</text>
    </g>

    <g transform="translate(0, 320)">
      <text y="0" font-family="monospace" fill="#ffffff" font-size="18" font-weight="bold">> Receive. Read. Confirm.</text>
      <text y="35" font-family="monospace" fill="#ffffff" font-size="18" font-weight="bold">> Return to low power.</text>
      <text y="90" font-family="sans-serif" fill="#718096" font-size="16">No carousel. No device-side setup. No clutter.</text>
    </g>
  </g>

  <g transform="translate(850, 180)">
    <rect x="0" y="0" width="220" height="320" rx="15" fill="#1a202c" stroke="#4fd1c5" stroke-width="4"/>
    <rect x="20" y="40" width="180" height="90" rx="4" fill="#000" stroke="#2d3748"/>
    <text x="35" y="65" font-family="monospace" fill="#4fd1c5" font-size="12">98% 12:45</text>
    <text x="35" y="95" font-family="sans-serif" fill="#fff" font-size="14" font-weight="bold">INCOMING...</text>
    <path d="M110 0V-60M90 -60H130" stroke="#4fd1c5" stroke-width="6" stroke-linecap="round"/>
    <circle cx="110" cy="-100" r="10" fill="none" stroke="#4fd1c5" stroke-opacity="0.3"/>
    <circle cx="110" cy="-100" r="25" fill="none" stroke="#4fd1c5" stroke-opacity="0.2"/>
  </g>
</svg>
