    <rect x="18" y="18" width="154" height="214" rx="16" fill="#F2F7FB"/>
    <rect x="40" y="42" width="110" height="18" rx="9" fill="#0C5D74" opacity="0.86"/>
    <rect x="40" y="78" width="86" height="12" rx="6" fill="#A1B9C7"/>
    <rect x="40" y="102" width="102" height="12" rx="6" fill="#A1B9C7"/>
    <rect x="40" y="126" width="95" height="12" rx="6" fill="#A1B9C7"/>
    <rect x="40" y="156" width="94" height="46" rx="12" fill="#10384E"/>
    <text x="88" y="185" text-anchor="middle" fill="#D4F6FF" font-family="Verdana, Geneva, sans-serif" font-size="16" font-weight="700">PAGER</text>
