<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="86" y1="72" x2="1117" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1620"/>
      <stop offset="0.55" stop-color="#122738"/>
      <stop offset="1" stop-color="#163329"/>
    </linearGradient>
    <linearGradient id="screen" x1="260" y1="172" x2="488" y2="534" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DFF7FF"/>
      <stop offset="1" stop-color="#C8EDF2"/>
    </linearGradient>
    <linearGradient id="panel" x1="586" y1="140" x2="1045" y2="621" gradientUnits="userSpaceOnUse">
      <stop stop-color="#173044" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#1C4533" stop-opacity="0.92"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="760" rx="34" fill="url(#bg)"/>
  <circle cx="1010" cy="132" r="124" fill="#76D3FF" fill-opacity="0.08"/>
  <circle cx="172" cy="632" r="168" fill="#A7F0B3" fill-opacity="0.08"/>

  <text x="88" y="96" fill="#F2FBFF" font-family="Verdana, Geneva, sans-serif" font-size="42" font-weight="700">Pager OS Display Model</text>
  <text x="88" y="136" fill="#B6CBD6" font-family="Verdana, Geneva, sans-serif" font-size="22">Three fixed zones, fast message flow, no extra device-side navigation.</text>

  <g transform="translate(130 166)">
    <rect x="0" y="0" width="500" height="430" rx="42" fill="#09131B" stroke="#90E8F6" stroke-opacity="0.45" stroke-width="4"/>
    <rect x="40" y="42" width="420" height="346" rx="24" fill="url(#screen)"/>
    <rect x="40" y="42" width="420" height="64" rx="24" fill="#7AE4FF"/>
    <rect x="40" y="328" width="420" height="60" rx="0" fill="#C5F3D6"/>

    <rect x="338" y="62" width="82" height="26" rx="13" fill="#0E3950"/>
    <text x="58" y="82" fill="#0A3143" font-family="Verdana, Geneva, sans-serif" font-size="20" font-weight="700">88%</text>
    <text x="346" y="81" fill="#EFFFFF" font-family="Verdana, Geneva, sans-serif" font-size="19" font-weight="700">12:56</text>

    <rect x="72" y="166" width="340" height="66" rx="16" fill="#123344" opacity="0.07"/>
    <text x="70" y="208" fill="#0D3343" font-family="Verdana, Geneva, sans-serif" font-size="42" font-weight="700">Pump station line</text>
    <text x="70" y="257" fill="#0D3343" font-family="Verdana, Geneva, sans-serif" font-size="42" font-weight="700">is live again</text>

    <text x="62" y="365" fill="#18402F" font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="700">SOURCE / STATUS AREA</text>

    <rect x="-18" y="48" width="18" height="52" rx="9" fill="#7AE4FF"/>
    <rect x="-18" y="170" width="18" height="94" rx="9" fill="#9BE8B0"/>
    <rect x="-18" y="332" width="18" height="48" rx="9" fill="#D3FFC2"/>

    <text x="-6" y="82" fill="#D9F7FF" font-family="Verdana, Geneva, sans-serif" font-size="20" font-weight="700" text-anchor="end">Header</text>
    <text x="-6" y="220" fill="#D9F7FF" font-family="Verdana, Geneva, sans-serif" font-size="20" font-weight="700" text-anchor="end">Message</text>
    <text x="-6" y="364" fill="#D9F7FF" font-family="Verdana, Geneva, sans-serif" font-size="20" font-weight="700" text-anchor="end">Lower zone</text>
  </g>

  <g transform="translate(650 166)">
    <rect x="0" y="0" width="452" height="430" rx="30" fill="url(#panel)" stroke="#8AD8F2" stroke-opacity="0.28" stroke-width="3"/>

    <text x="34" y="58" fill="#F5FCFF" font-family="Verdana, Geneva, sans-serif" font-size="28" font-weight="700">Work flow</text>

    <circle cx="56" cy="112" r="17" fill="#7BE0FF"/>
    <circle cx="56" cy="210" r="17" fill="#9BE8B0"/>
    <circle cx="56" cy="308" r="17" fill="#D4FFC8"/>

    <path d="M56 130V192" stroke="#7ED9F4" stroke-width="4" stroke-linecap="round"/>
    <path d="M56 228V290" stroke="#A3EDB0" stroke-width="4" stroke-linecap="round"/>

    <text x="96" y="118" fill="#E9F6FD" font-family="Verdana, Geneva, sans-serif" font-size="24" font-weight="700">Incoming message wakes the screen</text>
    <text x="96" y="150" fill="#BFD3DE" font-family="Verdana, Geneva, sans-serif" font-size="20">The center area scrolls the text fast and clearly.</text>

    <text x="96" y="216" fill="#E9F6FD" font-family="Verdana, Geneva, sans-serif" font-size="24" font-weight="700">Another message resets the active window</text>
    <text x="96" y="248" fill="#BFD3DE" font-family="Verdana, Geneva, sans-serif" font-size="20">The pager stays focused on what arrived most recently.</text>

    <text x="96" y="314" fill="#E9F6FD" font-family="Verdana, Geneva, sans-serif" font-size="24" font-weight="700">Button confirms, LED reminds</text>
    <text x="96" y="346" fill="#BFD3DE" font-family="Verdana, Geneva, sans-serif" font-size="20">Unread messages keep the white LED active until the user checks them.</text>

    <rect x="34" y="382" width="384" height="28" rx="14" fill="#274D66"/>
    <rect x="34" y="382" width="256" height="28" rx="14" fill="#8BE6B0"/>
    <text x="34" y="374" fill="#BFD3DE" font-family="Verdana, Geneva, sans-serif" font-size="18">Simple device, readable message, low-power behavior</text>
  </g>
</svg>
