<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" fill="#0d1117"/>
  
  <g transform="translate(100, 100)">
    <text x="0" y="-30" font-family="sans-serif" fill="#ffffff" font-size="32" font-weight="bold">UI ARCHITECTURE</text>
    
    <rect width="450" height="240" rx="10" fill="#161b22" stroke="#30363d" stroke-width="2"/>
    
    <rect x="10" y="10" width="430" height="40" fill="#0d1117" stroke="#4fd1c5" stroke-dasharray="4"/>
    <text x="225" y="37" text-anchor="middle" font-family="monospace" fill="#4fd1c5" font-size="18">HEADER (BATT / TIME)</text>
    
    <rect x="10" y="60" width="430" height="120" fill="#0d1117" stroke="#fff" stroke-width="2"/>
    <text x="225" y="125" text-anchor="middle" font-family="sans-serif" fill="#fff" font-size="28" font-weight="bold">SCROLLING TEXT</text>
    
    <rect x="10" y="190" width="430" height="40" fill="#0d1117" stroke="#4fd1c5" stroke-dasharray="4"/>
    <text x="225" y="217" text-anchor="middle" font-family="monospace" fill="#4fd1c5" font-size="18">FOOTER (SENDER NAME)</text>
  </g>

  <g transform="translate(650, 100)">
    <text x="0" y="-30" font-family="sans-serif" fill="#ffffff" font-size="32" font-weight="bold">LOGIC FLOW</text>
    
    <g transform="translate(0, 20)">
      <rect width="400" height="80" rx="8" fill="#161b22" stroke="#4fd1c5"/>
      <text x="20" y="35" font-family="sans-serif" fill="#4fd1c5" font-size="18" font-weight="bold">01. WAKE ON TEXT</text>
      <text x="20" y="60" font-family="sans-serif" fill="#a0aec0" font-size="14">Screen wakes up, scrolls 3 times.</text>
      
      <g transform="translate(0, 120)">
        <rect width="400" height="80" rx="8" fill="#161b22" stroke="#4fd1c5"/>
        <text x="20" y="35" font-family="sans-serif" fill="#4fd1c5" font-size="18" font-weight="bold">02. MESSAGE QUEUE</text>
        <text x="20" y="60" font-family="sans-serif" fill="#a0aec0" font-size="14">Auto-scroll through new messages.</text>
      </g>
      
      <g transform="translate(0, 240)">
        <rect width="400" height="80" rx="8" fill="#161b22" stroke="#4fd1c5"/>
        <text x="20" y="35" font-family="sans-serif" fill="#4fd1c5" font-size="18" font-weight="bold">03. USER CONFIRM</text>
        <text x="20" y="60" font-family="sans-serif" fill="#a0aec0" font-size="14">Button press stops LED blinking.</text>
      </g>
    </g>
    
    <line x1="200" y1="100" x2="200" y2="140" stroke="#30363d" stroke-width="2" />
    <line x1="200" y1="220" x2="200" y2="260" stroke="#30363d" stroke-width="2" />
  </g>

  <rect x="100" y="550" width="1000" height="120" rx="8" fill="#1a202c" stroke="#2d3748"/>
  <text x="130" y="595" font-family="monospace" fill="#4fd1c5" font-size="22">Deep Sleep Mode Active</text>
  <text x="130" y="630" font-family="sans-serif" fill="#718096" font-size="18">The device remains in low-power state until a LoRa packet is received or the button is pressed.</text>
</svg>
