<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="92" y1="74" x2="1116" y2="694" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1620"/>
      <stop offset="0.56" stop-color="#12283A"/>
      <stop offset="1" stop-color="#173329"/>
    </linearGradient>
    <linearGradient id="screen" x1="256" y1="194" x2="470" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DDF6FF"/>
      <stop offset="1" stop-color="#CDECF1"/>
    </linearGradient>
    <linearGradient id="panel" x1="650" y1="176" x2="1070" y2="594" gradientUnits="userSpaceOnUse">
      <stop stop-color="#183044" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#1B4233" stop-opacity="0.92"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="760" rx="34" fill="url(#bg)"/>
  <circle cx="1034" cy="130" r="126" fill="#78D7FF" fill-opacity="0.08"/>
  <circle cx="160" cy="636" r="170" fill="#A7EEB3" fill-opacity="0.08"/>

  <text x="88" y="94" fill="#F2FBFF" font-family="Verdana, Geneva, sans-serif" font-size="40" font-weight="700">Pager OS Display Model</text>
  <text x="88" y="132" fill="#B7CBD6" font-family="Verdana, Geneva, sans-serif" font-size="21">Three fixed zones. Fast message flow. Minimal device-side UI.</text>

  <g transform="translate(124 166)">
    <rect x="0" y="0" width="500" height="442" rx="42" fill="#09131B" stroke="#91E7F5" stroke-opacity="0.4" stroke-width="4"/>
    <rect x="48" y="48" width="404" height="348" rx="24" fill="url(#screen)"/>
    <rect x="48" y="48" width="404" height="64" rx="24" fill="#7BE3FF"/>
    <rect x="48" y="334" width="404" height="62" fill="#CFF2D6"/>

    <text x="76" y="90" fill="#123349" font-family="Verdana, Geneva, sans-serif" font-size="20" font-weight="700">85%</text>
    <rect x="344" y="66" width="82" height="26" rx="13" fill="#16354B"/>
    <text x="356" y="85" fill="#F3FBFF" font-family="Verdana, Geneva, sans-serif" font-size="18" font-weight="700">12:56</text>

    <rect x="92" y="176" width="278" height="58" rx="14" fill="#103244" opacity="0.08"/>
    <text x="88" y="212" fill="#16374D" font-family="Verdana, Geneva, sans-serif" font-size="34" font-weight="700">Pump line active</text>
    <text x="88" y="252" fill="#16374D" font-family="Verdana, Geneva, sans-serif" font-size="34" font-weight="700">Switch to east gate</text>

    <text x="84" y="372" fill="#214433" font-family="Verdana, Geneva, sans-serif" font-size="20" font-weight="700">STATUS / SOURCE SURFACE</text>

    <rect x="24" y="68" width="14" height="38" rx="7" fill="#7BE3FF"/>
    <rect x="24" y="182" width="14" height="88" rx="7" fill="#A6ECB1"/>
    <rect x="24" y="348" width="14" height="34" rx="7" fill="#D9FFC8"/>

    <text x="58" y="80" fill="#DDF5FF" font-family="Verdana, Geneva, sans-serif" font-size="18" font-weight="700">Header</text>
    <text x="58" y="176" fill="#DDF5FF" font-family="Verdana, Geneva, sans-serif" font-size="18" font-weight="700">Message</text>
    <text x="58" y="326" fill="#DDF5FF" font-family="Verdana, Geneva, sans-serif" font-size="18" font-weight="700">Lower zone</text>
  </g>

  <g transform="translate(664 166)">
    <rect x="0" y="0" width="444" height="442" rx="32" fill="url(#panel)" stroke="#8ED8F1" stroke-opacity="0.26" stroke-width="3"/>

    <text x="34" y="60" fill="#F4FCFF" font-family="Verdana, Geneva, sans-serif" font-size="28" font-weight="700">Message flow</text>

    <g transform="translate(34 104)">
      <rect x="0" y="0" width="376" height="84" rx="18" fill="rgba(255,255,255,0.04)"/>
      <circle cx="28" cy="28" r="14" fill="#7BE0FF"/>
      <text x="58" y="34" fill="#EAF8FE" font-family="Verdana, Geneva, sans-serif" font-size="24" font-weight="700">Wake on text</text>
      <text x="58" y="62" fill="#C1D4DE" font-family="Verdana, Geneva, sans-serif" font-size="18">Screen wakes and the message starts scrolling.</text>
    </g>

    <g transform="translate(34 214)">
      <rect x="0" y="0" width="376" height="96" rx="18" fill="rgba(255,255,255,0.04)"/>
      <circle cx="28" cy="30" r="14" fill="#A3EDB0"/>
      <text x="58" y="36" fill="#EAF8FE" font-family="Verdana, Geneva, sans-serif" font-size="24" font-weight="700">Refresh on new text</text>
      <text x="58" y="64" fill="#C1D4DE" font-family="Verdana, Geneva, sans-serif" font-size="18">A newer message takes focus.</text>
      <text x="58" y="88" fill="#C1D4DE" font-family="Verdana, Geneva, sans-serif" font-size="18">The active timer starts again.</text>
    </g>

    <g transform="translate(34 336)">
      <rect x="0" y="0" width="376" height="80" rx="18" fill="rgba(255,255,255,0.04)"/>
      <circle cx="28" cy="26" r="14" fill="#DBFFC9"/>
      <text x="58" y="32" fill="#EAF8FE" font-family="Verdana, Geneva, sans-serif" font-size="24" font-weight="700">Button and LED</text>
      <text x="58" y="58" fill="#C1D4DE" font-family="Verdana, Geneva, sans-serif" font-size="18">Button confirms. LED stays active for unread.</text>
    </g>
  </g>
</svg>
